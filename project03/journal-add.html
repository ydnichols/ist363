<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roam &amp; Recall – Add Journal Entry</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">Roam <span>&amp;</span> Recall</div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Explore</a></li>
      <li><a href="saved.html" class="nav-link">Saved</a></li>
      <li><a href="journal.html" class="nav-link active">Journal</a></li>
    </ul>
    <div class="nav-avatar">
      <div class="avatar-circle">YN</div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="page-section add-entry-page">

    <a href="journal.html" class="back-link">← Back</a>

    <div class="add-entry-card">
      <h2 class="add-entry-title">Add New Journal Entry</h2>

      <!-- Destination + Location -->
      <div class="form-row two-col">
        <div class="form-group">
          <label class="form-label" for="dest-name">Destination Name</label>
          <input type="text" id="dest-name" class="form-input" placeholder="e.g. Kyoto, Japan" />
        </div>
        <div class="form-group">
          <label class="form-label" for="dest-location">Location</label>
          <input type="text" id="dest-location" class="form-input" placeholder="Country / Region" />
        </div>
      </div>

      <!-- Dates -->
      <div class="form-row two-col">
        <div class="form-group">
          <label class="form-label" for="start-date">Start Date</label>
          <input type="date" id="start-date" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" for="end-date">End Date</label>
          <input type="date" id="end-date" class="form-input" />
        </div>
      </div>

      <!-- Photo + Notes -->
      <div class="add-photo-block">
        <div class="photo-upload-box">
          <span class="photo-icon">📷</span>
          <span class="photo-label">Add Photo</span>
        </div>
        <div class="form-group notes-group">
          <label class="form-label" for="trip-notes">Trip Notes</label>
          <textarea id="trip-notes" class="form-textarea" placeholder="Write about your experience…"></textarea>
        </div>
      </div>

      <!-- Rating -->
      <div class="form-group">
        <label class="form-label">Rating</label>
        <div class="star-rating">
          <span class="star">☆</span>
          <span class="star">☆</span>
          <span class="star">☆</span>
          <span class="star">☆</span>
          <span class="star">☆</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="add-entry-actions">
        <a href="journal.html" class="btn-cancel-entry">Cancel</a>
        <button class="btn-save-entry">Save Entry</button>
      </div>

    </div>
  </main>

</body>
</html>
